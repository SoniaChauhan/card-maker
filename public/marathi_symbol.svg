<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Om Symbol (ॐ) for Marathi -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="#d4af37" text-anchor="middle">ॐ</text>
  
  <!-- Swastik decorations -->
  <g fill="#fff" opacity="0.5">
    <!-- Left Swastik pattern -->
    <rect x="8" y="45" width="12" height="3"/>
    <rect x="12" y="40" width="3" height="12"/>
    <rect x="8" y="40" width="5" height="3"/>
    <rect x="15" y="49" width="5" height="3"/>
    
    <!-- Right Swastik pattern -->
    <rect x="80" y="45" width="12" height="3"/>
    <rect x="85" y="40" width="3" height="12"/>
    <rect x="88" y="40" width="5" height="3"/>
    <rect x="80" y="49" width="5" height="3"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="30" cy="18" r="4" fill="#d4af37"/>
  <circle cx="70" cy="18" r="4" fill="#d4af37"/>
  <circle cx="50" cy="88" r="4" fill="#d4af37"/>
</svg>
