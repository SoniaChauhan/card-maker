<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Om Symbol (ॐ) for Gujarati -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="#d4af37" text-anchor="middle">ॐ</text>
  
  <!-- Decorative Kalash/Pot shapes -->
  <g fill="#fff" opacity="0.5">
    <!-- Left Kalash -->
    <ellipse cx="18" cy="55" rx="8" ry="10"/>
    <rect x="14" y="42" width="8" height="5" rx="1"/>
    <polygon points="18,38 14,42 22,42"/>
    
    <!-- Right Kalash -->
    <ellipse cx="82" cy="55" rx="8" ry="10"/>
    <rect x="78" y="42" width="8" height="5" rx="1"/>
    <polygon points="82,38 78,42 86,42"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="35" cy="20" r="3" fill="#d4af37"/>
  <circle cx="65" cy="20" r="3" fill="#d4af37"/>
  <circle cx="50" cy="88" r="4" fill="#d4af37"/>
</svg>
