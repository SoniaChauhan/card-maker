<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c3ce0"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
  </defs>
  <!-- Circular background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Thin white ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#fff" stroke-width="8" opacity="0.35"/>
  <!-- CT text -->
  <text x="256" y="276" text-anchor="middle" dominant-baseline="central"
        font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="240"
        fill="#ffffff" letter-spacing="-10">CT</text>
</svg>