<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Om Symbol (ॐ) -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#d4af37" text-anchor="middle">ॐ</text>
  
  <!-- Decorative Lotus Petals Left -->
  <ellipse cx="15" cy="50" rx="8" ry="15" fill="#fff" opacity="0.4" transform="rotate(-30 15 50)"/>
  <ellipse cx="20" cy="55" rx="6" ry="12" fill="#fff" opacity="0.3" transform="rotate(-15 20 55)"/>
  
  <!-- Decorative Lotus Petals Right -->
  <ellipse cx="85" cy="50" rx="8" ry="15" fill="#fff" opacity="0.4" transform="rotate(30 85 50)"/>
  <ellipse cx="80" cy="55" rx="6" ry="12" fill="#fff" opacity="0.3" transform="rotate(15 80 55)"/>
  
  <!-- Small decorative dots -->
  <circle cx="30" cy="20" r="3" fill="#d4af37"/>
  <circle cx="70" cy="20" r="3" fill="#d4af37"/>
  <circle cx="50" cy="90" r="3" fill="#d4af37"/>
</svg>
